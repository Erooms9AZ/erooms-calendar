
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>E Rooms – Mobile</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png"> 

  <link rel="apple-touch-startup-image" href="launch-1284x2778.png" media="(device-width: 428px) and (device-height: 926px)">
  <link rel="apple-touch-startup-image" href="launch-1284x2778.png" media="(device-width: 390px) and (device-height: 844px)">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes"> <!-- optional, Android ignores -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="stylesheet" href="mobile.css">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">


<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #fafafa;
}

  #mobileContainer {
  padding: 10px;
}

/* MOBILE HEADER – VISUAL STYLING ONLY */
#mobileHeader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  background: #673ab7;
  color: white;

  margin: 0 -10px 15px;
  border-radius: 0 0 8px 8px;
}

/* FIX FOR STICKY BREAKING ON MOBILE */
body, html {
  overflow-x: hidden;
}

main, .calendar-wrapper, .outer-container, .page-container {
  overflow: visible !important;
}

#mobileHeader button {
  background: white;
  color: #673ab7;
  border: none;
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 16px;
}

.testSlot {
  background: #e8ddff;
  border-color: #c7b3ff;
}

/* DURATION BUTTONS */
#durationButtons {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

#durationButtons button {
  flex: 1;
  padding: 14px;
  font-size: 16px;
  border: 1px solid #444;
  background: #eee;
  border-radius: 6px;
}

#durationButtons button.active {
  background: #444;
  color: white;
}

/* SLOT LIST */
#slotList {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-top: 180px; /* add this */
}

.slotItem {
  padding: 16px;
  background: #fff;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.slotItem.available {
  background: #e8ddff;
  border-color: #c7b3ff;
}

.slotItem.unavailable {
  background: #eee;
  color: #777;
}

/* BOOKING OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.booking-box {
  background: white;
  padding: 20px;
  width: 90%;
  max-width: 400px;
  border-radius: 12px;

  /* Auto-fit to screen height */
  max-height: 85vh;
  overflow-y: auto;
  box-sizing: border-box;
}

/* ROOM SELECTOR */
#mobileRoomSelector {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 3000;
}

#mobileRoomSelector .room-btn {
  background: #673ab7;
  color: white;
  padding: 14px 20px;
  margin: 10px 0;
  border-radius: 8px;
  font-size: 18px;
  width: 200px;
  text-align: center;
}

#mobileRoomCancel {
  background: #444;
  color: white;
  padding: 12px 20px;
  margin-top: 15px;
  border-radius: 8px;
  font-size: 16px;
  width: 200px;
}

/* LEGEND */
#slotLegend {
  display: flex;
  gap: 12px;
  margin: 10px 0 15px;
  font-size: 14px;
  align-items: center;
  flex-wrap: wrap;
}

.legendItem {
  display: flex;
  align-items: center;
  gap: 6px;
}

.legendColor {
  width: 14px;
  height: 14px;
  border-radius: 3px;
  display: inline-block;
}

.legendColor.both  { background-color: #9c27b0; }
.legendColor.room1 { background-color: #4caf50; }
.legendColor.room2 { background-color: #2196f3; }

/* WHOLE MOBILE MENU STICKY */
#mobileStickyHeader {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 999;
  background: #fff;
  padding: 10px 10px 0;
  box-sizing: border-box;
  border-bottom: 1px solid #ddd;
}

/* Ultra‑compact equipment toggles (purple theme) */
.equip-toggle {
  display: flex;
  gap: 6px;
  margin: 4px 0;
}

.equip-toggle button {
  flex: 1;
  padding: 4px 0;          /* much smaller height */
  font-size: 14px;         /* smaller text */
  border-radius: 6px;
  border: 2px solid #673ab7;
  background: #f3eaff;
  color: #673ab7;
  cursor: pointer;
  transition: 0.2s;
}

/* YES (active) */
.equip-toggle button.active {
  background: #673ab7;
  color: white;
  border-color: #673ab7;
}

/* NO (active) */
.equip-toggle button[data-value="0"].active {
  background: #555;
  border-color: #555;
  color: white;
}

/* Reduce vertical spacing inside Form 2 */
#form2 label {
  margin-top: 4px;
  margin-bottom: 2px;
  font-size: 14px;
}

/* Make equipment rows tighter */
.equip-toggle {
  margin: 2px 0;
  gap: 4px;
}

.equip-toggle button {
  padding: 4px 0;
  font-size: 13px;
  border-radius: 5px;
}

/* Compact price box */
#priceBox {
  padding: 8px !important;
  font-size: 15px !important;
  line-height: 1.25 !important;
  margin-top: 10px !important;
  margin-bottom: 10px !important;
}

#form1 label {
  display: block;
  margin: 6px 0 2px;
  font-size: 16px;
  color: #000;
}
</style>
</head>
<body>

<div id="mobileContainer">

  <div id="mobileStickyHeader">

    <div id="mobileHeader">
      <button id="prevDayBtn">←</button>
      <div id="dayLabel">Loading…</div>
      <button id="nextDayBtn">→</button>
    </div>

    <div id="durationButtons">
      <button data-hours="1" class="active">1 Hour</button>
      <button data-hours="2">2 Hours</button>
      <button data-hours="3">3 Hours</button>
    </div>

    <div id="mobileLegend" style="
      display:flex;
      justify-content:space-around;
      align-items:center;
      padding:6px 0;
      background:#f5f5f5;
      font-size:14px;
      border-bottom:1px solid #ddd;
    ">
      <span class="legendItem">
        <span class="legendColor both"></span> Both rooms
      </span>
      <span class="legendItem">
        <span class="legendColor room1"></span> Room 1
      </span>
      <span class="legendItem">
        <span class="legendColor room2"></span> Room 2
      </span>
      <span class="legendItem">
        <span class="legendColor unavailable"></span> Unavailable
      </span>
    </div>

  </div>

  <div id="mobileRoomSelector" style="display:none;">
    <button class="room-btn" data-room="room1">Room 1</button>
    <button class="room-btn" data-room="room2">Room 2</button>
    <button id="mobileRoomCancel">Cancel</button>
  </div>

  <div id="slotList"></div>
</div>

<div id="bookingOverlay" class="overlay" style="display:none;">
  <div id="bookingForm" class="booking-box">

    <!-- FORM 1 -->
    <div id="form1">

        <h3>Booking Summary</h3>

        <div id="bookingSummary"></div>
        
<label>Name*</label>
<input type="text" id="custName" style="width:100%" required>

<label>Email*</label>
<input type="email" id="custEmail" style="width:100%" required>

<label>Phone*</label>
<input type="tel" id="custPhone" style="width:100%" required>



        <div id="bookingStatus" style="color:red;"></div>

        <button id="nextBtn">Next</button>
        <button id="cancelBtn">Cancel</button>
    </div>

    <!-- FORM 2 -->
<div id="form2" style="display:none;">

    <h3>Equipment Requirements</h3>

    <label>PA System (Includes 2 mics + stands)</label>
    <div class="equip-toggle" data-target="paSystem">
      <button type="button" data-value="0">No</button>
      <button type="button" data-value="1" class="active">Yes</button>
      <input type="hidden" id="paSystem" value="1">
    </div>

    <label style="margin-top:10px;">Guitar Amp (Max 2)</label>
    <div class="equip-toggle" data-target="guitarAmp">
      <button type="button" data-value="0">0</button>
      <button type="button" data-value="1">1</button>
      <button type="button" data-value="2" class="active">2</button>
      <input type="hidden" id="guitarAmp" value="2">
    </div>

    <label style="margin-top:10px;">Bass Amp</label>
    <div class="equip-toggle" data-target="bassAmp">
      <button type="button" data-value="0">No</button>
      <button type="button" data-value="1" class="active">Yes</button>
      <input type="hidden" id="bassAmp" value="1">
    </div>

    <label style="margin-top:10px;">Drum Kit</label>
    <div class="equip-toggle" data-target="drumKit">
      <button type="button" data-value="0">No</button>
      <button type="button" data-value="1" class="active">Yes</button>
      <input type="hidden" id="drumKit" value="1">
    </div>

    <div id="priceBox" style="
        background:white;
        padding:15px;
        margin-top:15px;
        margin-bottom:15px;
        border-radius:8px;
        box-shadow:0 0 10px rgba(0,0,0,0.15);
        font-size:18px;
        line-height:1.4;
    ">
        <div>Room Hire: £0.00</div>
        <div>Equipment Hire: £0.00</div>
        <div><strong>Total: £0.00</strong></div>
    </div>

    <div id="bookingStatus2" style="color:red;"></div>

    <button id="submitBtn">Submit</button>
    <button id="backBtn">Back</button>
</div>

  </div>
</div>

<div id="loadingOverlay" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.4);
  z-index:9998;
  color:white;
  font-size:24px;
  align-items:center;
  justify-content:center;
">
  Submitting your booking…
</div>

<div id="successBox" class="booking-box" style="display:none;">
    <div id="successMessage"></div>
    <br>
    <button id="successOk">OK</button>
</div>

<script src="mobile.js"></script>

<!-- NEW: Toggle button logic -->
<script>
document.querySelectorAll(".equip-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    const wrapper = btn.closest(".equip-toggle");
    const hidden = wrapper.querySelector("input");

    wrapper.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    hidden.value = btn.dataset.value;

    updatePriceBox();
  });
});
</script>
<script>
window.addEventListener('pageshow', (event) => {
  if (event.persisted) {
    window.location.reload();
  }
});
</script>
</body>
</html>
